name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # upewnij się, czy Twoja gałąź to 'main' czy 'master'

# Wymagane uprawnienia dla wbudowanego wdrażania GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # automatycznie buforuje paczki, przyspieszając kolejne wdrożenia

      # NAPRAWA BŁĘDU: Instalacja zależności (w tym @tailwindcss/vite) przed budowaniem
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # POPRAWKA KOŃCÓWKI (Standard GitHub Actions zamiast gh-pages):
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4