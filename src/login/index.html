<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4 antialiased">

  <main class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-md w-full">
    <header class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-900">Zaloguj się</h1>
      <p class="text-sm text-slate-500 mt-1">Podaj dane, aby zarządzać bazą artykułów</p>
    </header>

    <form id="login-form" class="space-y-4">
      
      <section class="flex flex-col gap-1">
        <label for="login-email" class="text-sm font-semibold text-slate-700">Adres e-mail</label>
        <input type="email" id="login-email" placeholder="np. test@test.pl" class="border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all" required />
      </section>

      <section class="flex flex-col gap-1">
        <label for="login-password" class="text-sm font-semibold text-slate-700">Hasło</label>
        <input type="password" id="login-password" placeholder="••••••••" class="border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all" required />
      </section>

      <output id="error-message" class="text-sm text-red-600 font-medium hidden bg-red-50 p-2.5 rounded-lg"></output>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg font-semibold text-sm transition-colors duration-200 shadow-sm mt-2 cursor-pointer">
        Zaloguj się
      </button>
    </form>

    <nav class="mt-4 text-center">
      <a href="../index.html" class="text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">&larr; Powrót do strony głównej</a>
    </nav>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
